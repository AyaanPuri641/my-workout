<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Aesthetics Workout Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0F;
    --card: #111118;
    --card-inner: #0D0D14;
    --card-deep: #0A0A12;
    --border: #1A1A24;
    --border-light: #2A2A34;
    --text: #E8E8ED;
    --text-dim: #888;
    --text-muted: #666;
    --text-faint: #555;
    --text-ghost: #444;
    --text-hidden: #333;
    --accent: #FF6B35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Helvetica Neue', -apple-system, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  }

  .ambient {
    position: fixed; top: -30%; right: -20%; width: 600px; height: 600px;
    border-radius: 50%; pointer-events: none; z-index: 0;
    transition: background 0.6s ease;
  }
  .ambient2 {
    position: fixed; bottom: -20%; left: -15%; width: 400px; height: 400px;
    border-radius: 50%; pointer-events: none; z-index: 0;
    transition: background 0.6s ease;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto; padding: 24px 16px;
  }

  .label {
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    font-weight: 600; margin-bottom: 6px; font-family: 'Space Mono', monospace;
  }
  h1 { font-size: 28px; font-weight: 700; line-height: 1.2; color: #fff; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

  .split-bar {
    background: var(--card); border-radius: 14px; padding: 14px 16px;
    margin-bottom: 20px; border: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 6px 10px; justify-content: center;
  }
  .split-tag {
    font-size: 10px; font-weight: 600; font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px; padding: 3px 8px; border-radius: 6px;
  }

  .day-scroll {
    display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto;
    padding-bottom: 4px; scrollbar-width: none; -ms-overflow-style: none;
  }
  .day-scroll::-webkit-scrollbar { display: none; }

  .day-btn {
    flex: 0 0 auto; padding: 10px 14px; border-radius: 14px;
    font-weight: 600; font-size: 12px; cursor: pointer;
    transition: all 0.25s ease; font-family: 'DM Sans', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; min-width: 52px; border: 2px solid var(--border);
    background: var(--card); color: var(--text-faint);
  }
  .day-btn.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); color: var(--accent); }
  .day-btn .emoji { font-size: 16px; }

  .day-card {
    background: var(--card); border-radius: 20px; padding: 24px 20px;
    margin-bottom: 16px; border: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
  }

  .day-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .day-tag {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }
  .day-title { font-size: 22px; font-weight: 700; color: #fff; }
  .day-focus { font-size: 13px; color: #777; margin-top: 4px; }
  .day-count { font-size: 28px; font-weight: 700; font-family: 'Space Mono', monospace; text-align: right; }
  .day-count-label { font-size: 11px; color: var(--text-faint); }

  .aesthetic-note {
    padding: 10px 14px; border-radius: 10px; margin-bottom: 16px;
    font-size: 12px; line-height: 1.5; font-style: italic;
  }

  .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

  .exercise-list { display: flex; flex-direction: column; gap: 8px; }

  .exercise {
    border-radius: 14px; background: var(--card-inner);
    border: 1px solid var(--border); transition: all 0.2s ease; overflow: hidden;
  }
  .exercise.done { opacity: 0.65; }
  .exercise.expanded { border-color: color-mix(in srgb, var(--accent) 30%, transparent); }

  .exercise-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; cursor: pointer;
  }

  .checkbox {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
    border: 2px solid #333; background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; margin-top: 1px;
  }
  .checkbox.checked { border-color: var(--accent); background: var(--accent); }

  .exercise-info { flex: 1; min-width: 0; }
  .exercise-name {
    font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px;
  }
  .exercise.done .exercise-name { color: var(--text-dim); text-decoration: line-through; }

  .exercise-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
  .exercise-meta .val { font-weight: 600; }
  .exercise-tip { font-size: 11px; color: var(--text-faint); margin-top: 4px; font-style: italic; }

  .how-btn {
    flex-shrink: 0; padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--border-light); background: #15151F;
    color: var(--text-dim); font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s ease; margin-top: 1px;
  }
  .how-btn.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }

  .expand-panel {
    padding: 0 16px 16px; border-top: 1px solid color-mix(in srgb, var(--accent) 8%, transparent);
  }
  .expand-inner {
    margin-top: 12px; padding: 14px; background: var(--card-deep);
    border-radius: 12px; border: 1px solid color-mix(in srgb, var(--accent) 12%, transparent);
  }
  .expand-label {
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }
  .expand-text { font-size: 13px; line-height: 1.65; color: #BBB; margin-bottom: 14px; }

  .yt-btn {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s ease;
  }

  .freq-card {
    background: var(--card); border-radius: 16px; padding: 16px 18px;
    margin-bottom: 16px; border: 1px solid var(--border);
  }
  .freq-title {
    font-size: 12px; color: var(--text-dim); font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    font-family: 'Space Mono', monospace; margin-bottom: 12px;
  }
  .freq-row { margin-bottom: 10px; }
  .freq-row:last-child { margin-bottom: 0; }
  .freq-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .freq-muscle { font-size: 12px; color: #BBB; font-weight: 500; }
  .freq-detail { font-size: 11px; color: var(--text-muted); }
  .freq-bar { width: 100%; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .freq-fill { height: 100%; border-radius: 3px; opacity: 0.7; }

  .tips-btn {
    width: 100%; padding: 16px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .tips-arrow { transition: transform 0.3s ease; font-size: 18px; }
  .tips-arrow.open { transform: rotate(180deg); }

  .tips-panel {
    background: var(--card); border-radius: 16px; padding: 16px;
    margin-bottom: 16px; border: 1px solid var(--border);
    display: none; flex-direction: column; gap: 10px;
  }
  .tips-panel.open { display: flex; }
  .tip {
    font-size: 13px; color: #999; line-height: 1.5;
    padding: 10px 12px; background: var(--card-inner);
    border-radius: 10px; border-left: 3px solid var(--accent);
  }

  .footer {
    text-align: center; padding: 16px 0 32px;
    font-size: 12px; color: var(--text-hidden);
  }
  .footer-sub { color: var(--text-ghost); font-size: 11px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .day-card { animation: fadeIn 0.3s ease; }
</style>
</head>

      { name: "Dynamic Stretching", sets: 1, reps: "10 min", rest: "—", note: "Leg swings, arm circles", howTo: "Moving stretches: leg swings, arm circles, hip circles, walking high knees, butt kicks.", search: "" },
      { name: "Light Walk or Cycle", sets: 1, reps: "15 min", rest: "—", note: "Easy pace, blood flow", howTo: "Relaxed walk or easy bike ride. Blood flow for recovery, not intensity.", search: "" },
      { name: "Yoga / Static Stretching", sets: 1, reps: "10 min", rest: "—", note: "Hold each stretch 30s", howTo: "Hold stretches: touch toes, quad stretch, chest stretch, child's pose, pigeon pose. Breathe deeply.", search: "" },
    ],
  },
];

const TIPS = [
  { text: "🎾 2 hrs of tennis & pickleball daily = amazing cardio. You don't need extra cardio. The gym builds the muscle underneath.", color: "#FF6B35" },
  { text: "📐 The V-taper illusion: Wide shoulders + wide back + small waist = aesthetic. That's why we hit shoulders and back twice a week.", color: "#4ECDC4" },
  { text: "📈 Progressive overload: Add 1 rep or 1 kg each week. Small gains compound into big results over months.", color: "#F59E0B" },
  { text: "🥩 Protein is non-negotiable: ~100g/day (1.6g per kg). Chicken, eggs, Greek yogurt, paneer, dal, whey.", color: "#FF6B6B" },
  { text: "💤 Sleep 8-9 hours. Growth hormone peaks during deep sleep. Skipping sleep = skipping gains.", color: "#A855F7" },
  { text: "⏳ Aesthetics take time. Trust the process — real changes show in 8-12 weeks of consistency.", color: "#10B981" },
  { text: "🪞 Take progress photos monthly (same lighting, same pose). The mirror lies daily but photos don't.", color: "#6366F1" },
];

const FREQ = [
  { muscle: "Shoulders", freq: "3x", note: "Mon + Wed + Sat", w: "100%", c: "#F59E0B" },
  { muscle: "Back (Lats)", freq: "2x", note: "Tue + Sat", w: "70%", c: "#4ECDC4" },
  { muscle: "Chest", freq: "2x", note: "Mon + Fri", w: "70%", c: "#FF6B35" },
  { muscle: "Arms", freq: "3x", note: "Mon + Tue + Fri", w: "100%", c: "#A855F7" },
  { muscle: "Abs / Core", freq: "4x", note: "Mon + Wed + Thu + Fri", w: "100%", c: "#FF6B6B" },
  { muscle: "Legs", freq: "1x", note: "Thu (+ tennis)", w: "40%", c: "#10B981" },
];

let state = {
  selectedDay: 0,
  completed: JSON.parse(localStorage.getItem('workout_completed') || '{}'),
  expanded: null,
  showTips: false,
};

function save() { localStorage.setItem('workout_completed', JSON.stringify(state.completed)); }

function render() {
  const d = DAYS[state.selectedDay];
  const completedCount = d.exercises.filter((_, i) => state.completed[`${state.selectedDay}-${i}`]).length;
  const progress = (completedCount / d.exercises.length) * 100;

  document.getElementById('ambient1').style.background = `radial-gradient(circle, ${d.color}15, transparent 70%)`;
  document.getElementById('ambient2').style.background = `radial-gradient(circle, ${d.color}08, transparent 70%)`;

  let html = `
    <div style="margin-bottom:24px">
      <p class="label" style="color:${d.color}">Aesthetics Program</p>
      <h1>Build Your Best Physique</h1>
      <p class="subtitle">62.75 kg · V-Taper · Lean Muscle · Defined Abs · 45-50 min</p>
    </div>

    <div class="split-bar">
      ${DAYS.map((dd, i) => `<span class="split-tag" style="color:${dd.color};background:${dd.color}12">${dd.tag}</span>`).join('')}
    </div>

    <div class="day-scroll">
      ${DAYS.map((dd, i) => `
        <button class="day-btn ${state.selectedDay === i ? 'active' : ''}" onclick="selectDay(${i})" style="${state.selectedDay === i ? `border-color:${dd.color};background:${dd.color}12;color:${dd.color}` : ''}">
          <span class="emoji">${dd.emoji}</span>
          <span>${dd.day.slice(0, 3)}</span>
        </button>
      `).join('')}
    </div>

    <div class="day-card" style="border-color:${d.color}25">
      <div class="day-header">
        <div>
          <div class="day-tag" style="background:${d.color}20;color:${d.color}">${d.label}</div>
          <div class="day-title">${d.day}</div>
          <div class="day-focus">${d.focus}</div>
        </div>
        <div>
          <div class="day-count" style="color:${d.color}">${completedCount}/${d.exercises.length}</div>
          <div class="day-count-label">done</div>
        </div>
      </div>

      <div class="aesthetic-note" style="background:${d.color}08;border:1px solid ${d.color}15;color:${d.color}">
        ✨ ${d.aesthetic}
      </div>

      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%;background:linear-gradient(90deg,${d.color},${d.color}AA)"></div>
      </div>

      <div class="exercise-list">
        ${d.exercises.map((ex, i) => {
          const key = `${state.selectedDay}-${i}`;
          const isDone = !!state.completed[key];
          const isExp = state.expanded === key;
          return `
            <div class="exercise ${isDone ? 'done' : ''} ${isExp ? 'expanded' : ''}" style="${isExp ? `border-color:${d.color}50` : isDone ? `border-color:${d.color}30;background:${d.color}10` : ''}">
              <div class="exercise-row" onclick="toggleDone(${i})">
                <div class="checkbox ${isDone ? 'checked' : ''}" style="${isDone ? `border-color:${d.color};background:${d.color}` : ''}">
                  ${isDone ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
                </div>
                <div class="exercise-info">
                  <div class="exercise-name">${ex.name}</div>
                  <div class="exercise-meta">
                    <span><span class="val" style="color:${d.color}">${ex.sets}</span> sets</span>
                    <span><span class="val" style="color:${d.color}">${ex.reps}</span> reps</span>
                    <span>Rest: ${ex.rest}</span>
                  </div>
                  <div class="exercise-tip">💡 ${ex.note}</div>
                </div>
                <button class="how-btn ${isExp ? 'active' : ''}" style="${isExp ? `border-color:${d.color};background:${d.color}20;color:${d.color}` : ''}" onclick="event.stopPropagation();toggleExpand('${key}')">${isExp ? 'Hide' : 'How?'}</button>
              </div>
              ${isExp ? `
                <div class="expand-panel">
                  <div class="expand-inner" style="border-color:${d.color}20">
                    <p class="expand-label" style="color:${d.color}">How to do it</p>
                    <p class="expand-text">${ex.howTo}</p>
                    ${ex.search ? `
                      <button class="yt-btn" style="border:1px solid ${d.color}40;background:linear-gradient(135deg,${d.color}15,${d.color}08);color:${d.color}" onclick="event.stopPropagation();window.open('https://www.youtube.com/results?search_query='+encodeURIComponent('${ex.search} form tutorial'),'_blank')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="${d.color}"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                        Watch Form Tutorial
                      </button>
                    ` : ''}
                  </div>
                </div>
              ` : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="freq-card">
      <div class="freq-title">Weekly Muscle Frequency</div>
      ${FREQ.map(f => `
        <div class="freq-row">
          <div class="freq-header">
            <span class="freq-muscle">${f.muscle}</span>
            <span class="freq-detail">${f.freq} — ${f.note}</span>
          </div>
          <div class="freq-bar"><div class="freq-fill" style="width:${f.w};background:${f.c}"></div></div>
        </div>
      `).join('')}
    </div>

    <button class="tips-btn" onclick="toggleTips()">
      <span>💡 Aesthetics Tips</span>
      <span class="tips-arrow ${state.showTips ? 'open' : ''}">▾</span>
    </button>

    <div class="tips-panel ${state.showTips ? 'open' : ''}">
      ${TIPS.map(t => `<div class="tip" style="border-left-color:${t.color}">${t.text}</div>`).join('')}
    </div>

    <div class="footer">
      Chest+Tri · Back+Bi · Shoulders+Abs · Legs · Chest+Arms · Back+Shoulders · Rest
      <br><span class="footer-sub">Tap to check off · "How?" for guides · 🎥 for video demos</span>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
}

function selectDay(i) { state.selectedDay = i; state.expanded = null; render(); }
function toggleDone(i) {
  const key = `${state.selectedDay}-${i}`;
  state.completed[key] = !state.completed[key];
  if (!state.completed[key]) delete state.completed[key];
  save(); render();
}
function toggleExpand(key) { state.expanded = state.expanded === key ? null : key; render(); }
function toggleTips() { state.showTips = !state.showTips; render(); }

render();
</script>
</body>
</html>
