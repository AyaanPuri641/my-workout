<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Aesthetics Workout Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060A; --card: #0E0E15; --card2: #0A0A10; --card3: #08080D;
    --border: #181822; --border2: #252530;
    --text: #EAEAF0; --t2: #8888A0; --t3: #5C5C72; --t4: #3D3D50; --t5: #2A2A38;
    --accent: #FF6B35;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden;padding-bottom:80px}
  input[type="number"]{background:var(--card2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Space Mono',monospace;font-size:15px;padding:10px;width:68px;text-align:center;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
  input[type="number"]:focus{border-color:var(--accent)}
  input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

  .glow{position:fixed;width:500px;height:500px;border-radius:50%;pointer-events:none;z-index:0;transition:background .8s ease;filter:blur(40px);opacity:.5}
  .g1{top:-35%;right:-25%} .g2{bottom:-30%;left:-20%}
  .wrap{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:20px 16px}

  .mono{font-family:'Space Mono',monospace}
  .tag{display:inline-block;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}

  /* Bottom nav */
  .bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,6,10,.92);border-top:1px solid var(--border);display:flex;justify-content:center;padding:6px 0 calc(6px + env(safe-area-inset-bottom));backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
  .nb{flex:1;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;background:none;border:none;cursor:pointer;color:var(--t3);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:.8px;transition:color .2s}
  .nb.on{color:var(--accent)}
  .nb svg{width:20px;height:20px}

  /* Workout timer bar */
  .timer-bar{position:fixed;top:0;left:0;right:0;z-index:99;padding:calc(env(safe-area-inset-top) + 8px) 16px 10px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:space-between;gap:12px;transition:all .3s ease}
  .timer-pill{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;font-size:13px;font-weight:700}
  .timer-time{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;letter-spacing:1px}
  .timer-btn{padding:8px 16px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px}

  /* Rest timer overlay */
  .rest-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);background:rgba(6,6,10,.85)}
  .rest-circle{width:200px;height:200px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
  .rest-svg{position:absolute;inset:0;transform:rotate(-90deg)}
  .rest-time{font-family:'Space Mono',monospace;font-size:48px;font-weight:700;color:#fff}
  .rest-label{font-size:13px;color:var(--t2);margin-top:4px;font-weight:600}

  /* Day selector */
  .dscroll{display:flex;gap:5px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .dscroll::-webkit-scrollbar{display:none}
  .dbtn{flex:0 0 auto;padding:10px 12px;border-radius:12px;font-weight:600;font-size:11px;cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:48px;border:1.5px solid var(--border);background:var(--card);color:var(--t3)}

  /* Cards */
  .dcard{background:var(--card);border-radius:20px;padding:22px 18px;margin-bottom:14px;border:1px solid var(--border);animation:fadeIn .3s ease}
  .ex{border-radius:14px;background:var(--card2);border:1px solid var(--border);transition:all .2s;overflow:hidden;margin-bottom:7px}
  .ex:last-child{margin-bottom:0}
  .exrow{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;cursor:pointer}
  .cb{width:20px;height:20px;border-radius:6px;flex-shrink:0;border:2px solid var(--t4);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
  .exn{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:3px}
  .exm{display:flex;gap:10px;font-size:11.5px;color:var(--t2);flex-wrap:wrap}
  .exm .v{font-weight:700}
  .ext{font-size:10.5px;color:var(--t3);margin-top:3px;font-style:italic}
  .lastlog{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-top:5px}
  .abtn{display:flex;gap:5px;flex-shrink:0;margin-top:2px}
  .sbtn{padding:5px 9px;border-radius:7px;border:1px solid var(--border2);background:var(--card3);color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;letter-spacing:.3px}

  .log-panel{padding:10px 14px 14px;border-top:1px solid var(--border)}
  .set-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .set-label{font-size:11px;font-weight:700;width:44px;flex-shrink:0}
  .ig{display:flex;align-items:center;gap:5px}
  .ig span{font-size:10px;color:var(--t3)}
  .savebtn{width:100%;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;transition:all .2s;letter-spacing:.3px}

  .expand-panel{padding:0 14px 14px;border-top:1px solid var(--border)}
  .expand-inner{margin-top:10px;padding:14px;background:var(--card3);border-radius:12px;border:1px solid var(--border)}
  .yt-btn{width:100%;padding:11px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;margin-top:10px}

  .freq-card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--border)}
  .fbar{width:100%;height:3px;background:var(--border);border-radius:3px;overflow:hidden}

  .pcard{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
  .pexbtn{width:100%;padding:13px 14px;border-radius:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;transition:all .2s;text-align:left}
  .pr-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;letter-spacing:.5px}
  .hrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:11.5px}
  .hrow:last-child{border-bottom:none}

  .tsec{background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--border)}
  .tsec h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .ti{font-size:12.5px;color:#bbb;line-height:1.6;padding:9px 11px;background:var(--card2);border-radius:10px;margin-bottom:7px;border-left:3px solid var(--t3)}
  .ti:last-child{margin-bottom:0}
  .ti strong{color:var(--text)}

  .split-bar{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:18px;border:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px 8px;justify-content:center}
  .stag{font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 7px;border-radius:5px}

  .music-fab{position:fixed;bottom:76px;right:16px;z-index:98;width:48px;height:48px;border-radius:14px;border:1px solid #FF2D5530;background:linear-gradient(135deg,#FF2D5520,#FF2D5508);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s;box-shadow:0 4px 20px rgba(255,45,85,.15)}
  .music-fab:active{transform:scale(.9)}

  .footer{text-align:center;padding:14px 0 28px;font-size:11px;color:var(--t4)}
  .clear-btn{padding:6px 12px;border-radius:8px;background:#2a1515;border:1px solid #4a2020;color:#ff6b6b;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}

  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pulse{animation:pulse 1.5s ease infinite}
</style>
</head>
<body>

<div class="glow g1" id="g1"></div>
<div class="glow g2" id="g2"></div>

<!-- Timer bar (hidden by default) -->
<div class="timer-bar" id="timerBar" style="display:none"></div>

<!-- Rest timer overlay (hidden by default) -->
<div class="rest-overlay" id="restOverlay" style="display:none"></div>

<!-- Apple Music FAB -->
<div class="music-fab" onclick="window.open('music://','_self')" title="Open Apple Music">

3.3-.19.65-.43 1.28-.75 1.88z"/></svg>
</div>

<div class="wrap" id="app"></div>

<div class="bnav" id="bnav">
  <button class="nb on" onclick="switchTab('workout')" id="nw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6.5 6.5h11M6.5 12h11M6.5 17.5h11"/><rect x="3" y="3" width="18" height="18" rx="4"/></svg>
    WORKOUT
  </button>
  <button class="nb" onclick="switchTab('timer')" id="nt">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5M12 5V3M10 3h4"/></svg>
    TIMER
  </button>
  <button class="nb" onclick="switchTab('progress')" id="np">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 20h18M6 16l4-4 4 4 4-8"/></svg>
    PROGRESS
  </button>
  <button class="nb" onclick="switchTab('tips')" id="ni">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 01-2 2h-4a2 2 0 01-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7zM9 21h6"/></svg>
    TIPS
  </button>
</div>

<script>
// ===================== DATA =====================
const DAYS=[
{day:"Monday",label:"Chest & Triceps",focus:"Upper, Mid & Lower Chest + Triceps",emoji:"🔥",color:"#FF6B35",tag:"Chest+Tri",aesthetic:"Builds a full, defined chest — the centerpiece of an aesthetic upper body",exercises:[
{name:"Incline Dumbbell Press",sets:4,reps:"10-12",rest:60,note:"Upper chest — key for full chest look",howTo:"Sit on incline bench (30-45°). Press dumbbells up, lower slowly.",search:"incline dumbbell press form",formTips:["Squeeze shoulder blades into bench","Elbows at 45°, not flared at 90°","3 second negative for more growth"]},
{name:"Chest Press Machine",sets:3,reps:"10-12",rest:60,note:"Overall chest mass",howTo:"Sit in machine, push handles forward until arms straight, return slowly.",search:"chest press machine form",formTips:["Handles at mid-chest height","Push with chest, not shoulders","Don't lock elbows fully"]},
{name:"Cable Chest Fly",sets:3,reps:"12-15",rest:45,note:"Inner chest definition",howTo:"Stand between cables, bring handles together with slight arm bend. Squeeze.",search:"cable chest fly",formTips:["Slight bend in elbows always","Squeeze 1 second when hands meet","Control the opening — don't let cables yank you"]},
{name:"Chest Dips (Assisted)",sets:3,reps:"8-10",rest:60,note:"Lower chest + triceps",howTo:"Assisted dip machine. Lean forward, lower to 90°, push up.",search:"assisted chest dip",formTips:["Lean forward 15-20° for chest","Stop at 90° elbow bend","Skip if shoulders hurt — do another fly"]},

{name:"Overhead Tricep Extension",sets:3,reps:"12",rest:45,note:"Long head — bigger arms",howTo:"One dumbbell overhead with both hands. Lower behind head, extend up.",search:"overhead tricep extension",formTips:["Elbows point forward, stay close","Feel the stretch behind your head","Go lighter if shoulders feel it"]},
{name:"Plank Hold",sets:3,reps:"40-60s",rest:30,note:"Core foundation",howTo:"Forearm plank. Body straight. Squeeze abs and glutes.",search:"forearm plank form",formTips:["Squeeze glutes to protect lower back","Look between hands, not forward","Rest-pause if needed — finish the time"]}
]},
{day:"Tuesday",label:"Back & Biceps",focus:"Width, Thickness & Arm Size",emoji:"💪",color:"#4ECDC4",tag:"Back+Bi",aesthetic:"Builds the V-taper — wide lats make your waist look smaller",exercises:[

{name:"Dumbbell Row",sets:3,reps:"10-12",rest:60,note:"Fixes imbalances",howTo:"One knee on bench, row dumbbell to hip.",search:"single arm dumbbell row",formTips:["Pull to hip, not armpit","Back flat like a table","Squeeze shoulder blade 1 second"]},

// ===================== STATE =====================
function getWeek(){const d=new Date();const jan1=new Date(d.getFullYear(),0,1);return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)}

let S={
  tab:'workout',
  day:Math.max(0,new Date().getDay()-1===- 1?6:new Date().getDay()-1),
  done:JSON.parse(localStorage.getItem('wk3_done')||'{}'),
  logs:JSON.parse(localStorage.getItem('wk3_logs')||'{}'),
  week:parseInt(localStorage.getItem('wk3_week')||'0'),
  exp:null,lg:null,showTips:false,
  pDay:null,pEx:null,
  // Timer state
  timerOn:false,timerStart:0,timerElapsed:0,timerInterval:null,
  // Rest timer
  restOn:false,restTotal:0,restLeft:0,restInterval:null,
  // Workout summary
  wkSummary:null,
};

// Weekly reset check
const cw=getWeek();
if(S.week!==cw){S.done={};S.week=cw;localStorage.setItem('wk3_done',JSON.stringify(S.done));localStorage.setItem('wk3_week',String(cw))}

function save(){localStorage.setItem('wk3_done',JSON.stringify(S.done));localStorage.setItem('wk3_logs',JSON.stringify(S.logs));localStorage.setItem('wk3_week',String(S.week))}

function getLast(di,ei){const e=S.logs[`${di}-${ei}`]||[];return e.length?e[e.length-1]:null}
function getPR(di,ei){let m=0;(S.logs[`${di}-${ei}`]||[]).forEach(e=>e.sets.forEach(s=>{if(s.weight>m)m=s.weight}));return m}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
function fmtTime(ms){const s=Math.floor(ms/1000);const m=Math.floor(s/60);return`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

// ===================== TABS =====================
function switchTab(t){S.tab=t;S.exp=null;S.lg=null;document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById({workout:'nw',timer:'nt',progress:'np',tips:'ni'}[t]).classList.add('on');render()}
function selDay(i){S.day=i;S.exp=null;S.lg=null;render()}
function togDone(i){const k=`${S.day}-${i}`;S.done[k]=!S.done[k];if(!S.done[k])delete S.done[k];save();render()}
function togExp(i){const k=`${S.day}-${i}`;S.exp=S.exp===k?null:k;S.lg=null;render()}
function togLog(i){const k=`${S.day}-${i}`;S.lg=S.lg===k?null:k;S.exp=null;render()}

function saveLog(di,ei){
  const ex=DAYS[di].exercises[ei];const sets=[];
  for(let s=0;s<ex.sets;s++){const w=document.getElementById(`w-${s}`);const r=document.getElementById(`r-${s}`);if(w&&r)sets.push({weight:parseFloat(w.value)||0,reps:parseInt(r.value)||0})}
  const k=`${di}-${ei}`;if(!S.logs[k])S.logs[k]=[];
  S.logs[k].push({date:new Date().toISOString().split('T')[0],sets});
  S.done[k]=true;S.lg=null;save();render();
}

// ===================== TIMER =====================
function startWorkout(){
  S.timerOn=true;S.timerStart=Date.now();S.timerElapsed=0;S.wkSummary=null;
  S.timerInterval=setInterval(()=>{S.timerElapsed=Date.now()-S.timerStart;renderTimer()},1000);
  renderTimer();render();
}
function stopWorkout(){
  clearInterval(S.timerInterval);
  const d=DAYS[S.day];
  const completed=d.exercises.filter((_,i)=>S.done[`${S.day}-${i}`]).length;
  let totalSets=0,totalReps=0,totalVol=0;
  d.exercises.forEach((_,i)=>{const l=getLast(S.day,i);if(l&&S.done[`${S.day}-${i}`]){l.sets.forEach(s=>{totalSets++;totalReps+=s.reps;totalVol+=s.weight*s.reps})}});
  S.wkSummary={time:S.timerElapsed,exercises:completed,total:d.exercises.length,sets:totalSets,reps:totalReps,volume:totalVol};
  S.timerOn=false;S.timerElapsed=0;
  renderTimer();
  if(S.tab==='timer')render();
}
function renderTimer(){
  const tb=document.getElementById('timerBar');
  if(!S.timerOn){tb.style.display='none';return}
  const d=DAYS[S.day];
  tb.style.display='flex';
  tb.style.background=`rgba(6,6,10,.92)`;
  tb.style.borderBottom=`1px solid ${d.color}30`;
  tb.innerHTML=`
    <div class="timer-pill" style="background:${d.color}15;color:${d.color}">
      <span class="pulse" style="width:8px;height:8px;border-radius:50%;background:${d.color}"></span>
      <span class="timer-time">${fmtTime(S.timerElapsed)}</span>
    </div>
    <button class="timer-btn" style="background:${d.color};color:#fff" onclick="stopWorkout()">End Workout</button>
  `;
}

// Rest timer
function startRest(secs,color){
  S.restOn=true;S.restTotal=secs;S.restLeft=secs;
  const ov=document.getElementById('restOverlay');ov.style.display='flex';
  renderRest(color);
  S.restInterval=setInterval(()=>{
    S.restLeft--;
    if(S.restLeft<=0){clearInterval(S.restInterval);S.restOn=false;ov.style.display='none';
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }else{renderRest(color)}
  },1000);
}
function skipRest(){clearInterval(S.restInterval);S.restOn=false;document.getElementById('restOverlay').style.display='none'}
function renderRest(c){
  const pct=(S.restLeft/S.restTotal)*100;const circ=2*Math.PI*90;const offset=circ-(pct/100*circ);
  document.getElementById('restOverlay').innerHTML=`
    <div class="rest-circle">
      <svg class="rest-svg" width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="90" fill="none" stroke="${c}15" stroke-width="6"/>
        <circle cx="100" cy="100" r="90" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/>
      </svg>
      <span class="rest-time" style="color:${c}">${S.restLeft}</span>
      <span class="rest-label">REST</span>
    </div>
    <button style="margin-top:32px;padding:12px 32px;border-radius:12px;border:1px solid ${c}40;background:${c}15;color:${c};font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="skipRest()">Skip Rest</button>
  `;
}

// ===================== RENDER =====================
function render(){
  const app=document.getElementById('app');
  if(S.tab==='workout')app.innerHTML=rWorkout();
  else if(S.tab==='timer')app.innerHTML=rTimer();
  else if(S.tab==='progress')app.innerHTML=rProgress();
  else app.innerHTML=rTips();
}

        </div>
        <div style="background:var(--card2);border-radius:12px;padding:14px 8px">
          <div class="mono" style="font-size:22px;font-weight:700;color:${d.color}">${ws.volume>0?Math.round(ws.volume):0}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">Volume (kg)</div>
        </div>
      </div>
      <button style="padding:12px 24px;border-radius:12px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="S.wkSummary=null;render()">Dismiss</button>
    </div>`;
  } else if(!S.timerOn){
    h+=`<div class="dcard" style="border-color:${d.color}20;text-align:center">
      <div style="font-size:60px;margin-bottom:16px">${d.emoji}</div>
      <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px">${d.label}</div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:24px">${d.exercises.length} exercises · ~45-50 min</div>
      <button onclick="startWorkout()" style="width:100%;padding:16px;border-radius:14px;border:none;background:${d.color};color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px">Start Workout</button>
      <p style="font-size:11px;color:var(--t3);margin-top:12px">Timer tracks your total session time. Use the workout tab to log exercises.</p>
    </div>`;
    // Quick rest timer
    h+=`<div class="dcard" style="border-color:var(--border)">
      <div class="mono" style="font-size:11px;color:var(--t2);font-weight:700;letter-spacing:1.5px;margin-bottom:14px">QUICK REST TIMER</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        ${[30,45,60,90,120,180].map(s=>`<button onclick="startRest(${s},'${d.color}')" style="padding:14px 8px;border-radius:12px;border:1px solid ${d.color}25;background:${d.color}08;color:${d.color};font-size:14px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace">${s<60?s+'s':s/60+'m'}</button>`).join('')}
      </div>
    </div>`;
  } else {
    h+=`<div class="dcard" style="border-color:${d.color}30;text-align:center">
      <div class="pulse" style="width:12px;height:12px;border-radius:50%;background:${d.color};margin:0 auto 16px"></div>
      <div class="mono" style="font-size:52px;font-weight:700;color:#fff;margin-bottom:4px">${fmtTime(S.timerElapsed)}</div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:24px">Workout in progress</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        <button onclick="switchTab('workout')" style="padding:12px;border-radius:12px;border:1px solid ${d.color}30;background:${d.color}10;color:${d.color};font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">← Log Exercises</button>
        <button onclick="stopWorkout()" style="padding:12px;border-radius:12px;border:1px solid #ff6b6b30;background:#ff6b6b10;color:#ff6b6b;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">End Workout</button>
      </div>
    </div>`;
    // Quick rest
    h+=`<div class="dcard" style="border-color:var(--border)">
      <div class="mono" style="font-size:11px;color:var(--t2);font-weight:700;letter-spacing:1.5px;margin-bottom:14px">REST TIMER</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        ${[30,45,60,90,120,180].map(s=>`<button onclick="startRest(${s},'${d.color}')" style="padding:14px 8px;border-radius:12px;border:1px solid ${d.color}25;background:${d.color}08;color:${d.color};font-size:14px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace">${s<60?s+'s':s/60+'m'}</button>`).join('')}
      </div>
    </div>`;
  }
  return h;
}

function rProgress(){
  document.getElementById('g1').style.background=`radial-gradient(circle,#A855F715,transparent 70%)`;
  let h=`<div style="margin-bottom:22px"><p class="label mono" style="color:#A855F7">Your Progress</p><h1>Track Your Gains</h1><p class="subtitle">Weight & rep history</p></div>`;

  if(S.pDay!==null&&S.pEx!==null){
    const d=DAYS[S.pDay],ex=d.exercises[S.pEx],entries=S.logs[`${S.pDay}-${S.pEx}`]||[],pr=getPR(S.pDay,S.pEx);
    h+=`<button class="sbtn" style="margin-bottom:14px;border-color:${d.color};color:${d.color}" onclick="S.pDay=null;S.pEx=null;render()">← Back</button>`;
    h+=`<div class="pcard" style="border-color:${d.color}25"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div><div style="font-size:15px;font-weight:700;color:#fff">${ex.name}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${d.day} — ${d.label}</div></div>${pr>0?`<div class="pr-badge" style="background:${d.color}18;color:${d.color}">🏆 PR ${pr}kg</div>`:''}</div>`;
    if(!entries.length){h+=`<p style="font-size:12px;color:var(--t3);text-align:center;padding:18px 0">No logs yet. Hit "Log" on the workout tab!</p>`}
    else{
      if(entries.length>=2){const lm=Math.max(...entries[entries.length-1].sets.map(s=>s.weight)),pm=Math.max(...entries[entries.length-2].sets.map(s=>s.weight)),diff=lm-pm;
        if(diff>0)h+=`<div style="padding:9px 12px;border-radius:10px;background:#10B98112;border:1px solid #10B98125;margin-bottom:10px"><p style="font-size:11px;color:#10B981;margin:0;font-weight:600">📈 Up ${diff}kg since last session!</p></div>`;
        else if(diff===0)h+=`<div style="padding:9px 12px;border-radius:10px;background:#F59E0B12;border:1px solid #F59E0B25;margin-bottom:10px"><p style="font-size:11px;color:#F59E0B;margin:0;font-weight:600">📊 Same weight — try +1 rep per set or +0.5kg next time</p></div>`}
      entries.slice().reverse().forEach(e=>{h+=`<div class="hrow"><span style="color:var(--t2);font-weight:500">${fmtDate(e.date)}</span><span class="mono" style="color:#fff;font-size:10.5px">${e.sets.map(s=>s.weight+'kg×'+s.reps).join(' | ')}</span></div>`});
    }
    h+=`</div>`;
    if(entries.length){const le=entries[entries.length-1],tr=parseInt(ex.reps.split('-').pop())||12,ok=le.sets.every(s=>s.reps>=tr);
      h+=`<div class="tsec" style="border-color:${d.color}25"><h3 style="font-size:13px"><span style="color:${d.color}">💡</span> Progression</h3>${ok?`<div class="ti" style="border-left-color:#10B981"><strong>Ready to increase!</strong> You hit ${tr} reps on all sets. Go up 1-2.5 kg next time.</div>`:`<div class="ti" style="border-left-color:#F59E0B"><strong>Stay here.</strong> Work until all sets hit ${tr} reps with good form, then increase.</div>`}</div>`}
  } else {
    DAYS.forEach((d,di)=>{
      h+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span>${d.emoji}</span><span style="font-size:13px;font-weight:700;color:${d.color}">${d.day}</span><span style="font-size:11px;color:var(--t3)">— ${d.label}</span></div>`;
      d.exercises.forEach((ex,ei)=>{const entries=S.logs[`${di}-${ei}`]||[],last=entries.length?entries[entries.length-1]:null,pr=getPR(di,ei);
        h+=`<button class="pexbtn" onclick="S.pDay=${di};S.pEx=${ei};render()" style="border-color:${last?d.color+'20':'var(--border)'}"><div style="display:flex;flex-direction:column;align-items:flex-start;gap:1px"><span style="font-size:12px;font-weight:600;color:${last?'#fff':'var(--t3)'}">${ex.name}</span>${last?`<span style="font-size:10px;color:var(--t2)">Last: ${last.sets.map(s=>s.weight+'kg×'+s.reps).join(', ')}</span>`:`<span style="font-size:10px;color:var(--t4)">No logs</span>`}</div>${pr>0?`<span class="pr-badge" style="background:${d.color}18;color:${d.color}">PR ${pr}kg</span>`:'<span style="color:var(--t4)">→</span>'}</button>`});
      h+=`</div>`});
    h+=`<div style="text-align:center;padding:14px 0 28px"><button class="clear-btn" onclick="if(confirm('Clear ALL progress? Cannot undo.')){S.logs={};S.done={};save();render()}">Reset All Data</button></div>`;
  }
  return h;
}

function rTips(){
  document.getElementById('g1').style.background=`radial-gradient(circle,#10B98115,transparent 70%)`;
  return `<div style="margin-bottom:22px"><p class="label mono" style="color:#10B981">Improve</p><h1>Tips & Guidance</h1><p class="subtitle">Form, progression & nutrition</p></div>

  <div class="tsec"><h3>📈 When to Increase Weight</h3>
    <div class="ti" style="border-left-color:#10B981"><strong>The rule:</strong> All sets at top of rep range with good form → increase by 1-2.5 kg (upper body) or 2.5-5 kg (lower body).</div>
    <div class="ti" style="border-left-color:#4ECDC4"><strong>Example:</strong> Plan says 3×10-12 and you did 12, 12, 12 → go up. Did 12, 11, 9 → stay until all hit 12.</div>
    <div class="ti" style="border-left-color:#F59E0B"><strong>Micro-loading:</strong> Can't jump 2.5 kg? Add 1 extra rep per set. 10kg×10 to 10kg×12 is still progress.</div>
    <div class="ti" style="border-left-color:#A855F7"><strong>At 15</strong>, expect weight increases almost weekly on compound lifts for the first few months. Isolations progress slower — normal.</div>
  </div>

  <div class="tsec"><h3>⚡ Common Form Mistakes</h3>
    <div class="ti" style="border-left-color:#FF6B35"><strong>Ego lifting:</strong> If you can't control the weight for 3 seconds down, it's too heavy. Bad form → injuries, not gains.</div>
    <div class="ti" style="border-left-color:#FF6B6B"><strong>Bench press shoulders:</strong> Squeeze blades together. Elbows at 45°, not 90°. This one fix prevents most shoulder injuries.</div>
    <div class="ti" style="border-left-color:#4ECDC4"><strong>Back exercises:</strong> Drive elbows back, don't pull with hands. Hands are hooks — back does the work.</div>
    <div class="ti" style="border-left-color:#F59E0B"><strong>Lateral raises:</strong> Use 3-5 kg. Seriously. Light weight + perfect form > heavy swinging.</div>
    <div class="ti" style="border-left-color:#10B981"><strong>Half-rep squats:</strong> Go deep. Partial reps = partial muscles.</div>
    <div class="ti" style="border-left-color:#A855F7"><strong>Plank breathing:</strong> Breathe normally! Holding breath = gas out in 20s. Slow breathing = 60s+.</div>
  </div>

  <div class="tsec"><h3>🥩 Nutrition for Aesthetics</h3>
    <div class="ti" style="border-left-color:#FF6B35"><strong>Protein: ~100g/day</strong> (1.6g per kg at 62.75 kg). Most important nutrition factor for muscle.</div>
    <div class="ti" style="border-left-color:#4ECDC4"><strong>Sources:</strong> Eggs (6g each), chicken (31g/100g), paneer (18g/100g), Greek yogurt (10g/100g), dal (9g/cup cooked), chana (15g/cup), whey (24g/scoop).</div>
    <div class="ti" style="border-left-color:#F59E0B"><strong>Sample 100g day:</strong> 3 eggs + milk (24g) → chicken/paneer lunch (28g) → yogurt or shake (24g) → dal + paneer dinner (28g).</div>
    <div class="ti" style="border-left-color:#FF6B6B"><strong>Don't starve.</strong> With 2 hours of tennis daily, eating too little makes you weak, not lean. Fuel your training.</div>
    <div class="ti" style="border-left-color:#10B981"><strong>Water: 3-4 litres daily</strong>, especially in Nagpur heat. Dehydration = 10-20% strength loss + less definition.</div>
    <div class="ti" style="border-left-color:#A855F7"><strong>Timing:</strong> Carbs + protein 1-2 hrs pre-gym (banana + eggs). Protein meal within 1-2 hrs post-session.</div>
    <div class="ti" style="border-left-color:#6366F1"><strong>Limit:</strong> Sugary drinks, fried snacks, excessive sweets. Don't eliminate — just don't make daily. Add good food, don't just remove bad.</div>
  </div>

  <div class="tsec"><h3>💤 Recovery & Sleep</h3>
    <div class="ti" style="border-left-color:#6366F1"><strong>8-9 hours sleep.</strong> Growth hormone peaks during deep sleep. At 15, sleep IS gains.</div>
    <div class="ti" style="border-left-color:#A855F7"><strong>Soreness vs pain:</strong> Dull ache 1-2 days after = good (DOMS). Sharp pain during exercise = stop and check form.</div>
    <div class="ti" style="border-left-color:#FF6B35"><strong>Don't skip Sundays.</strong> Stretching and foam rolling = better Monday performance.</div>
  </div>

  <div class="tsec"><h3>🪞 Tracking Progress</h3>
    <div class="ti" style="border-left-color:#10B981"><strong>Monthly photos.</strong> Same spot, lighting, time. Front + side + back. Photos don't lie over months.</div>
    <div class="ti" style="border-left-color:#4ECDC4"><strong>Weekly weigh-in.</strong> Same day, morning, before eating. Track the trend, not the day.</div>
    <div class="ti" style="border-left-color:#F59E0B"><strong>Measurements > scale.</strong> Waist shrinks, shoulders widen, arms grow — scale might not move. Measure monthly.</div>
  </div>

  <div class="footer">Consistency beats everything.</div>`;
}

render();
</script>
