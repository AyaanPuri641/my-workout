<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Aesthetics Workout Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060A;--c1:#0E0E15;--c2:#0A0A10;--c3:#08080D;--b1:#181822;--b2:#252530;--t:#EAEAF0;--t2:#8888A0;--t3:#5C5C72;--t4:#3D3D50;--t5:#2A2A38}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden;padding-bottom:80px}
input[type="number"]{background:var(--c2);border:1px solid var(--b2);border-radius:10px;color:var(--t);font-family:'Space Mono',monospace;font-size:15px;padding:10px;width:72px;text-align:center;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none}
.g{position:fixed;width:500px;height:500px;border-radius:50%;pointer-events:none;z-index:0;transition:background .8s;filter:blur(40px);opacity:.5}
.g1{top:-35%;right:-25%}
.wrap{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:calc(env(safe-area-inset-top,0px) + 24px) 16px 20px 16px}
.mono{font-family:'Space Mono',monospace}
.tag{display:inline-block;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,6,10,.94);border-top:1px solid var(--b1);display:flex;justify-content:center;padding:5px 0 calc(5px + env(safe-area-inset-bottom));backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.nb{flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0;background:none;border:none;cursor:pointer;color:var(--t3);font-family:'DM Sans',sans-serif;font-size:8px;font-weight:700;letter-spacing:.6px;transition:color .2s}
.nb.on{color:var(--accent,#FF6B35)}
.nb svg{width:19px;height:19px}
.tbar{position:fixed;top:0;left:0;right:0;z-index:99;padding:calc(env(safe-area-inset-top) + 8px) 16px 8px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:space-between}
.dscroll{display:flex;gap:5px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.dscroll::-webkit-scrollbar{display:none}
.dbtn{flex:0 0 auto;padding:9px 11px;border-radius:11px;font-weight:600;font-size:11px;cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:46px;border:1.5px solid var(--b1);background:var(--c1);color:var(--t3)}
.dc{background:var(--c1);border-radius:18px;padding:20px 16px;margin-bottom:12px;border:1px solid var(--b1);animation:fi .3s ease}
.ex{border-radius:12px;background:var(--c2);border:1px solid var(--b1);transition:all .2s;overflow:hidden;margin-bottom:6px}
.ex:last-child{margin-bottom:0}
.exr{display:flex;align-items:flex-start;gap:9px;padding:12px 13px;cursor:pointer}
.cb{width:19px;height:19px;border-radius:6px;flex-shrink:0;border:2px solid var(--t4);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
.exn{font-size:13px;font-weight:600;margin-bottom:2px}
.exm{display:flex;gap:9px;font-size:11px;color:var(--t2);flex-wrap:wrap}
.exm .v{font-weight:700}
.ext{font-size:10px;color:var(--t3);margin-top:2px;font-style:italic}
.ll{display:inline-flex;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;margin-top:4px}
.ab{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.sb{padding:5px 8px;border-radius:6px;border:1px solid var(--b2);background:var(--c3);color:var(--t2);font-size:9.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.lp{padding:10px 13px 13px;border-top:1px solid var(--b1)}
.sr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.sl{font-size:10px;font-weight:700;width:40px;flex-shrink:0}
.ig{display:flex;align-items:center;gap:4px}
.ig span{font-size:9px;color:var(--t3)}
.svb{width:100%;padding:11px;border-radius:11px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:5px}
.ep{padding:0 13px 13px;border-top:1px solid var(--b1)}
.ei{margin-top:9px;padding:12px;background:var(--c3);border-radius:11px;border:1px solid var(--b1)}
.yb{width:100%;padding:10px 12px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:9px}
.fc{background:var(--c1);border-radius:14px;padding:13px 15px;margin-bottom:12px;border:1px solid var(--b1)}
.fb{width:100%;height:3px;background:var(--b1);border-radius:3px;overflow:hidden}
.pc{background:var(--c1);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--b1)}
.pb{display:flex;justify-content:space-between;align-items:center;width:100%;padding:11px 13px;border-radius:11px;background:var(--c2);border:1px solid var(--b1);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:6px;text-align:left}
.prb{display:inline-flex;font-size:8.5px;font-weight:700;padding:3px 6px;border-radius:5px;letter-spacing:.4px}
.hr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b1);font-size:11px}
.hr:last-child{border-bottom:none}
.ts{background:var(--c1);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--b1)}
.ts h3{font-size:14px;font-weight:700;color:#fff;margin-bottom:9px}
.ti{font-size:12px;color:#bbb;line-height:1.55;padding:8px 10px;background:var(--c2);border-radius:9px;margin-bottom:6px;border-left:3px solid var(--t3)}
.ti:last-child{margin-bottom:0}
.ti strong{color:var(--t)}
.sbar{background:var(--c1);border-radius:11px;padding:11px 13px;margin-bottom:16px;border:1px solid var(--b1);display:flex;flex-wrap:wrap;gap:4px 7px;justify-content:center}
.st{font-size:8.5px;font-weight:700;letter-spacing:.4px;padding:3px 6px;border-radius:4px}
.ro{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);background:rgba(6,6,10,.88)}
.mf{position:fixed;bottom:92px;right:14px;z-index:98;width:44px;height:44px;border-radius:12px;border:1px solid #FF2D5530;background:linear-gradient(135deg,#FF2D5520,#FF2D5508);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(255,45,85,.12)}
.ft{text-align:center;padding:12px 0 26px;font-size:10px;color:var(--t4)}
.clr{padding:5px 10px;border-radius:7px;background:#2a1515;border:1px solid #4a2020;color:#ff6b6b;font-size:9px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.bc{background:var(--c1);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--b1)}
.bstat{display:flex;flex-direction:column;align-items:center;padding:16px;background:var(--c2);border-radius:12px;border:1px solid var(--b1)}
.binput{background:var(--c2);border:1px solid var(--b2);border-radius:10px;color:var(--t);font-family:'Space Mono',monospace;font-size:16px;padding:12px;width:90px;text-align:center;outline:none;-webkit-appearance:none}
.wrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b1);font-size:12px}
.wrow:last-child{border-bottom:none}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.5s ease infinite}
</style>
</head>
<body>
<div class="g g1" id="g1"></div>
<div class="tbar" id="tb" style="display:none"></div>
<div class="ro" id="ro" style="display:none"></div>

<div class="wrap" id="app"></div>
<div class="bnav">
<button class="nb on" onclick="sw('workout')" id="nw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6.5 6.5h11M6.5 12h11M6.5 17.5h11"/><rect x="3" y="3" width="18" height="18" rx="4"/></svg>WORKOUT</button>
<button class="nb" onclick="sw('timer')" id="nt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5M12 5V3M10 3h4"/></svg>TIMER</button>
<button class="nb" onclick="sw('body')" id="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>BODY</button>
<button class="nb" onclick="sw('progress')" id="np"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 20h18M6 16l4-4 4 4 4-8"/></svg>PROGRESS</button>
<button class="nb" onclick="sw('tips')" id="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 01-2 2h-4a2 2 0 01-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7zM9 21h6"/></svg>TIPS</button>
</div>
<script>

if(weights.length>=2){const minW=Math.min(...weights.map(w=>w.weight))-1,maxW=Math.max(...weights.map(w=>w.weight))+1,range=maxW-minW||1;h+=`<div style="height:80px;margin-bottom:14px;position:relative;background:var(--c2);border-radius:10px;overflow:hidden;padding:8px"><svg width="100%" height="100%" viewBox="0 0 ${Math.max(weights.length-1,1)*40} 64" preserveAspectRatio="none" style="display:block"><polyline points="${weights.map((w,i)=>`${i*40},${64-((w.weight-minW)/range)*64}`).join(' ')}" fill="none" stroke="${bc}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${weights.map((w,i)=>`<circle cx="${i*40}" cy="${64-((w.weight-minW)/range)*64}" r="3" fill="${bc}"/>`).join('')}</svg></div>`}
weights.slice().reverse().forEach((entry,ri)=>{const i=weights.length-1-ri;h+=`<div class="wrow"><span style="color:var(--t2)">${fd(entry.date)}</span><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="color:#fff;font-size:13px">${entry.weight} kg</span>${i>0?`<button onclick="delWeight(${i})" style="padding:2px 6px;border-radius:4px;border:1px solid #4a2020;background:#2a1515;color:#ff6b6b;font-size:8px;font-weight:700;cursor:pointer">\u2715</button>`:''}</div></div>`})}
h+=`</div>`;
h+=`<div class="bc"><div class="mono" style="font-size:10px;color:${bc};font-weight:700;letter-spacing:1.5px;margin-bottom:10px">YOUR NUTRITION TARGETS</div><div class="ti" style="border-left-color:${bc}"><strong>Protein: ${pr}g/day</strong> (1.6g \u00D7 ${w}kg).</div><div class="ti" style="border-left-color:#4ECDC4"><strong>Water: 3-4 litres/day.</strong></div><div class="ti" style="border-left-color:#F59E0B"><strong>Sample ${pr}g day:</strong> ${Math.round(pr*0.24)}g breakfast \u2192 ${Math.round(pr*0.28)}g lunch \u2192 ${Math.round(pr*0.22)}g snack \u2192 ${Math.round(pr*0.26)}g dinner.</div></div>`;
h+=`<div class="ft">Weight updates protein target across the app</div>`;return h}

function rP(){
document.getElementById('g1').style.background=`radial-gradient(circle,#A855F715,transparent 70%)`;
let h=`<div style="margin-bottom:20px"><p class="mono" style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#A855F7;font-weight:600;margin-bottom:5px">Progress</p><h1 style="font-size:26px;font-weight:700;color:#fff">Track Your Gains</h1></div>`;
if(S.pDay!==null&&S.pEx!==null){const d=D[S.pDay],ex=d.exercises[S.pEx],entries=S.logs[`${S.pDay}-${S.pEx}`]||[],pr=gpr(S.pDay,S.pEx);
h+=`<button class="sb" style="margin-bottom:12px;border-color:${d.color};color:${d.color}" onclick="S.pDay=null;S.pEx=null;R()">\u2190 Back</button>`;
h+=`<div class="pc" style="border-color:${d.color}25"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-size:14px;font-weight:700;color:#fff">${ex.name}</div><div style="font-size:10px;color:var(--t2);margin-top:2px">${d.day} \u2014 ${d.label}</div></div>${pr>0?`<div class="prb" style="background:${d.color}18;color:${d.color}">\u{1F3C6} PR ${pr}kg</div>`:''}</div>`;
if(!entries.length)h+=`<p style="font-size:11px;color:var(--t3);text-align:center;padding:16px 0">No logs yet</p>`;
else{if(entries.length>=2){const lm=Math.max(...entries[entries.length-1].sets.map(s=>s.weight)),pm=Math.max(...entries[entries.length-2].sets.map(s=>s.weight)),diff=lm-pm;if(diff>0)h+=`<div style="padding:8px 10px;border-radius:9px;background:#10B98112;border:1px solid #10B98125;margin-bottom:8px"><p style="font-size:10px;color:#10B981;margin:0;font-weight:600">\u{1F4C8} +${diff}kg since last session!</p></div>`;else if(diff===0)h+=`<div style="padding:8px 10px;border-radius:9px;background:#F59E0B12;border:1px solid #F59E0B25;margin-bottom:8px"><p style="font-size:10px;color:#F59E0B;margin:0;font-weight:600">\u{1F4CA} Same weight \u2014 try +1 rep or +0.5kg</p></div>`}
entries.slice().reverse().forEach(e=>{h+=`<div class="hr"><span style="color:var(--t2)">${fd(e.date)}</span><span class="mono" style="color:#fff;font-size:10px">${e.sets.map(s=>s.weight+'\u00D7'+s.reps).join(' | ')}</span></div>`})}
h+=`</div>`;
if(entries.length){const le=entries[entries.length-1],tr=parseInt(ex.reps.split('-').pop())||12,ok=le.sets.every(s=>s.reps>=tr);h+=`<div class="ts" style="border-color:${d.color}25"><h3 style="font-size:12px">\u{1F4A1} Progression</h3>${ok?`<div class="ti" style="border-left-color:#10B981"><strong>Ready to increase!</strong> All sets hit ${tr} reps. Go up 1-2.5 kg.</div>`:`<div class="ti" style="border-left-color:#F59E0B"><strong>Stay here.</strong> Work until all sets hit ${tr} reps.</div>`}</div>`}
}else{
D.forEach((d,di)=>{h+=`<div style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:5px;margin-bottom:7px"><span>${d.emoji}</span><span style="font-size:12px;font-weight:700;color:${d.color}">${d.day}</span><span style="font-size:10px;color:var(--t3)">\u2014 ${d.label}</span></div>`;
d.exercises.forEach((ex,ei)=>{const entries=S.logs[`${di}-${ei}`]||[],last=entries.length?entries[entries.length-1]:null,pr=gpr(di,ei);
h+=`<button class="pb" onclick="S.pDay=${di};S.pEx=${ei};R()" style="border-color:${last?d.color+'20':'var(--b1)'}"><div><span style="font-size:11px;color:${last?'#fff':'var(--t3)'}">${ex.name}</span>${last?`<div style="font-size:9px;color:var(--t2)">Last: ${last.sets.map(s=>s.weight+'\u00D7'+s.reps).join(', ')}</div>`:`<div style="font-size:9px;color:var(--t4)">No logs</div>`}</div>${pr>0?`<span class="prb" style="background:${d.color}18;color:${d.color}">PR ${pr}kg</span>`:'<span style="color:var(--t4)">\u2192</span>'}</button>`});
h+=`</div>`});
h+=`<div style="text-align:center;padding:12px 0 24px"><button class="clr" onclick="if(confirm('Clear ALL data?')){S.logs={};S.done={};sv();R()}">Reset All</button></div>`}
return h}

function rI(){
document.getElementById('g1').style.background=`radial-gradient(circle,#10B98115,transparent 70%)`;const pr=protein();
return`<div style="margin-bottom:20px"><p class="mono" style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#10B981;font-weight:600;margin-bottom:5px">Improve</p><h1 style="font-size:26px;font-weight:700;color:#fff">Tips & Guidance</h1></div>
<div class="ts"><h3>\u{1F4C8} Increasing Weight</h3><div class="ti" style="border-left-color:#10B981"><strong>The rule:</strong> All sets at top rep range with good form \u2192 +1-2.5 kg upper body, +2.5-5 kg lower body.</div><div class="ti" style="border-left-color:#4ECDC4"><strong>Example:</strong> 3\u00D710-12, you did 12/12/12 \u2192 go up. Did 12/11/9 \u2192 stay.</div><div class="ti" style="border-left-color:#F59E0B"><strong>Micro-loading:</strong> Can't add 2.5 kg? Add 1 rep per set instead.</div><div class="ti" style="border-left-color:#A855F7"><strong>At 15</strong>, expect weekly increases on compounds for the first few months.</div></div>

<div class="ts"><h3>\u{1F4A4} Recovery</h3><div class="ti" style="border-left-color:#6366F1"><strong>8-9 hours sleep.</strong> Growth hormone peaks during deep sleep.</div><div class="ti" style="border-left-color:#A855F7"><strong>Soreness vs pain:</strong> Dull ache = good. Sharp pain during exercise = stop.</div></div>
